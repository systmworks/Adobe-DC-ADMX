name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release artifact
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Build merged ADMX at release version
        run: python scripts/merge.py ${{ steps.version.outputs.version }}

      - name: Validate ADMX
        run: python scripts/validate.py

      - name: Package release zip
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          STAGING="dist/AdobeDC"
          mkdir -p "$STAGING/en-US"
          cp build/AdobeDC.admx        "$STAGING/AdobeDC.admx"
          cp build/en-US/AdobeDC.adml  "$STAGING/en-US/AdobeDC.adml"
          cd dist
          zip -r "AdobeDC-v${VERSION}.zip" AdobeDC/
          echo "zip=dist/AdobeDC-v${VERSION}.zip" >> "$GITHUB_OUTPUT"
        id: package

      - name: Upload zip to release
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # v2.11.5
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/AdobeDC-v${{ steps.version.outputs.version }}.zip
          asset_name: AdobeDC-v${{ steps.version.outputs.version }}.zip
          tag: ${{ github.ref }}
          overwrite: true
